services:
  - type: web
    name: financial-analyzer-backend
    env: python
    buildCommand: pip install . && pip install fastapi uvicorn sse-starlette python-multipart redis psycopg[binary] langgraph langsmith langchain-core langchain-chroma langchain-openai langchain-text-splitters langchain-experimental openai langgraph-checkpoint-postgres
    startCommand: gunicorn src.api.server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONPATH
        value: src
      - key: OPENAI_API_KEY
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: REDIS_URL
        sync: false
